[pytest]
# Pytest configuration for MonaiUI tests

testpaths = src/tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Minimum Python version
minversion = 7.0

# Add options
addopts =
    -v
    --tb=short
    --strict-markers
    --disable-warnings

# Markers for organizing tests
markers =
    cuda: tests that require CUDA
    slow: slow running tests
    integration: integration tests
    unit: unit tests
